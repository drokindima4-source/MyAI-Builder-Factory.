name: AI_BUILDER
on:
  repository_dispatch:
    types: [build_event]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Create App
        run: |
          echo "Building ${{ github.event.client_payload.name }}"
          mkdir output
          echo "Name: ${{ github.event.client_payload.name }}" > output/app.txt
          echo "Desc: ${{ github.event.client_payload.desc }}" >> output/app.txt
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: Final_App_File
          path: output/
